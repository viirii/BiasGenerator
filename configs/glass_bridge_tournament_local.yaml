run_name: glass_bridge_tournament_local
seed: 7
artifacts_dir: artifacts

env:
  kind: glass_bridge_tournament
  transport: openenv
  base_url: http://127.0.0.1:8000
  auto_start_server: true
  initial_players: 16
  first_round_num_steps: 18
  max_rounds: 12

evaluation:
  games: 10

strategy:
  share_rates: [0.0, 0.25, 0.5, 0.75, 1.0]
  truth_rates: [0.0, 0.25, 0.5, 0.75, 1.0]
  # Agents with model_name "none" use heuristic; others use LLM. Mix for experiments.
  llm_model_pool: ["qwen3.5", "qwen2.5-7b", "smollm2-1.7b", "smollm2-135m"]
  # Optional: override model paths, e.g. qwen3.5: "unsloth/Qwen2.5-3B-Instruct"
  # llm_model_paths: {}

adaptation:
  kind: truth_scaled_by_reputation

checkpoint:
  dir: artifacts/checkpoints
  name: glass_bridge_tournament_placeholder.pt

logging:
  dir: artifacts/logs
